version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jutc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jutc
      POSTGRES_PASSWORD: jutc_pass
      POSTGRES_DB: jutc_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jutc -d jutc_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jutc_redis
    restart: unless-stopped
    ports:
      - '6381:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: jutc_backend
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://jutc:jutc_pass@postgres:5432/jutc_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: jutc-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: jutc-super-secret-refresh-key-change-in-production
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      QR_SECRET: jutc-super-secret-qr-key-change-in-production
      CORS_ORIGIN: http://localhost:5174
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend/prisma:/app/apps/backend/prisma

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: jutc_admin
    restart: unless-stopped
    ports:
      - '5174:80'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
